<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Meowcert</title>
  </head>
  <body class="splash">
    <!-- Full-page background layer (z-index -1). splash.ts sets its
         background-image to the post's bg PNG so the splash reads like
         the in-game stage — bg fills the whole page, captured cat
         snapshot sits on top in the .stage band. Hidden by default;
         shown once we have the activeBackground id from /api/preview-image. -->
    <div class="splash-bg" id="splash-bg" style="display: none;"></div>

    <!-- Cat-stage band — owner's captured screenshot fills this once
         the preview fetch resolves. Until then, the marquee fallback
         keeps the splash branded instead of blank.

         For empty-chart / unmapped posts (default seeded post + any
         accidental empty publish), splash.ts adds body.empty-chart which
         swaps the marquee for the V21 brand logo and stretches the
         stage to fill the viewport — matches the loading-screen +
         VisitPost empty-chart splash composition. -->
    <div class="stage" id="stage">
      <div class="marquee-fallback" id="marquee-fallback">MEOWCERT</div>
      <img class="brand-logo" id="brand-logo" src="/assets/images/logo.png" alt="Meowcert" />
    </div>

    <!-- Info panel — mirrors the VisitPost in-game info layout:
         author / song / play count / top 3 leaderboard / your best.
         Hidden by default; splash.ts shows it only once the per-post
         visit fetch returns a real ownerUsername. Scaffold / unmapped
         posts skip it so the splash collapses to MEOWCERT + PLAY only. -->
    <div class="info" id="info" style="display: none;">
      <div class="author" id="author"></div>
      <div class="song" id="song"></div>
      <div class="lb-header">
        TOP SCORES
      </div>
      <ol class="lb">
        <li id="lb-1">1. —</li>
        <li id="lb-2">2. —</li>
        <li id="lb-3">3. —</li>
      </ol>
      <div class="your-best" id="your-best"></div>
      <!-- "Updated 7s ago" — splash.ts polls /api/social/leaderboard
           every 10 s and tick-updates this line every second so it's
           visible that the data is live. -->
      <div class="lb-updated" id="lb-updated"></div>
    </div>

    <!-- Plays banner — high-visibility social-proof line above the CTA.
         Hidden until splash.ts gets the first leaderboard response so
         scaffold/unmapped posts don't show "0 plays". -->
    <div class="plays-banner" id="plays-banner" style="display: none;">
      <span class="plays-banner-count" id="plays-banner-count">0</span>
      <span class="plays-banner-label" id="plays-banner-label">plays</span>
    </div>

    <button class="play-button" id="start-button">
      <span class="play-arrow">▶</span>
      <span class="play-text">TAP TO PLAY</span>
    </button>

    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
