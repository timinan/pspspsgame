<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Meowcert</title>
  </head>
  <body class="splash">
    <div class="card">
      <div class="cat-row" aria-hidden="true">
        <span class="cat">🐱</span>
        <span class="note">♪</span>
        <span class="cat">😺</span>
        <span class="note">♫</span>
        <span class="cat">🐱</span>
      </div>
      <h1 class="brand">MEOWCERT</h1>
      <p class="subtitle">a rhythm show from a fellow redditor</p>
      <button class="play-button" id="start-button">
        <span class="play-arrow">▶</span>
        <span class="play-text">TAP TO PLAY</span>
      </button>
      <p class="hint">Tap the notes. Help the cats catch them.</p>
    </div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
